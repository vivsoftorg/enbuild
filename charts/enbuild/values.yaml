##@skip headlamp
headlamp:
  # Default values for headlamp.
  # This is a YAML-formatted file.
  # Declare variables to be passed into your templates.

  # -- Number of desired pods
  replicaCount: 1

  image:
    # -- Container image registry
    registry: ghcr.io
    # -- Container image name
    repository: headlamp-k8s/headlamp
    # -- Image pull policy. One of Always, Never, IfNotPresent
    pullPolicy: IfNotPresent
    # -- Container image tag, If "" uses appVersion in Chart.yaml
    tag: ""

  # -- ENBUILD spoke clusters Headlamp should be able to view. Each entry is
  # the cluster id used in the BE K8sApiProxy URL path
  # (/api/v1/clusters/<id>/k8s-api). The chart renders one cluster+context
  # per entry into the chart-managed `headlamp-kubeconfigs` ConfigMap, all
  # sharing the `anon` user (tenancy enforced downstream by BE
  # KubeProxyController + agent stream). Default empty (only `main`).
  #
  # Example (set via values override or --set):
  #   headlamp:
  #     spokes:
  #       - ccm-vendor13-eks-final
  #       - ccm-vendor13-demo3
  #
  # For multi-tenant scale (hundreds of spokes), this manual values list
  # is replaced by a BE projector endpoint that renders the kubeconfig
  # dynamically from the agent registry — see CODIFICATION.md "Unit 2".
  spokes: []

  # -- An optional list of references to secrets in the same namespace to use for pulling any of the images used
  imagePullSecrets: []
  # -- Overrides the name of the chart
  nameOverride: ""
  # -- Overrides the full name of the chart
  fullnameOverride: ""

  # -- Override the deployment namespace; defaults to .Release.Namespace
  namespaceOverride: ""

  # -- An optional list of init containers to be run before the main containers.
  # NOTE: BOTH prior init containers were removed 2026-05-19 in favor of
  # chart-managed ConfigMaps that survive helm-upgrade / auto-reconcile:
  #
  #  - `headlamp-plugins` init container (pulled external
  #    ghcr.io/vivsoftorg/enbuild-headlamp-theme image into a PVC) →
  #    replaced by templates/headlamp-plugin-configmap.yaml
  #    (`headlamp-plugin-enbuild-theme`), mounted at
  #    /headlamp/plugins/enbuild-theme.
  #  - `create-kubeconfig` init container (built only the `main` context
  #    into an emptyDir) → replaced by
  #    templates/headlamp-kubeconfigs-configmap.yaml (`headlamp-kubeconfigs`)
  #    which holds `main` PLUS every spoke from .Values.headlamp.spokes,
  #    mounted at /home/headlamp/.config/Headlamp/kubeconfigs/config.
  #
  # No external image dependency, no PVC, no init-container — operator
  # patches stop getting reverted on the next BE/headlamp roll.
  initContainers: []
  config:
    inCluster: true
    # -- base url path at which headlamp should run
    baseURL: "/headlamp"
    oidc:
      # Option 1:
      # @param config.oidc.secret - OIDC secret configuration
      # If you want to use an existing secret, set create to false and provide the name of the secret.
      # If you want to create a new secret, set create to true and provide the name of the secret.
      # Also provide the values for clientID, clientSecret, issuerURL, and scopes.
      # Example:
      # config:
      #   oidc:
      #     secret:
      #       create: true
      #       name: oidc
      secret:
        # -- Generate OIDC secret. If true, will generate a secret using .config.oidc.
        create: false
        # -- Name of the OIDC secret.
        name: oidc

      # Option 2:
      # @param config.oidc - OIDC env configuration
      # If you want to set the OIDC configuration directly, set the following values.
      # Example:
      # config:
      #   oidc:
      #     clientID: "clientID"
      #     clientSecret: "clientSecret"
      #     issuerURL: "issuerURL"
      #     scopes: "scopes"

      # -- OIDC client ID
      clientID: ""
      # -- OIDC client secret
      clientSecret: ""
      # -- OIDC issuer URL
      issuerURL: ""
      # -- OIDC scopes to be used
      scopes: ""
      # -- OIDC callback URL
      callbackURL: ""

      # -- OIDC client to be used during token validation
      validatorClientID: ""
      # -- OIDC Issuer URL to be used during token validation
      validatorIssuerURL: ""
      # -- Use 'access_token' instead of 'id_token' when authenticating using OIDC
      useAccessToken: false

      # Option 3:
      # @param config.oidc - External OIDC secret configuration
      # If you want to use an external secret for OIDC configuration, enable this option.
      # Provide the name of the secret to use.
      # Example:
      # config:
      #   oidc:
      #     secret:
      #       create: false
      #     externalSecret:
      #       enabled: true
      #       name: oidc
      externalSecret:
        enabled: false
        name: ""
    # -- directory to look for plugins
    pluginsDir: "/headlamp/plugins"
    watchPlugins: false
    # tlsCertPath: "/headlamp-cert/headlamp-ca.crt"
    # tlsKeyPath: "/headlamp-cert/headlamp-tls.key"
    # Extra arguments that can be given to the container. See charts/headlamp/README.md for more information.
    extraArgs:
      - "-enable-dynamic-clusters"

  # -- An optional list of environment variables
  # env:
  #   - name: KUBERNETES_SERVICE_HOST
  #     value: "localhost"
  #   - name: KUBERNETES_SERVICE_PORT
  #     value: "6443"

  # -- Mount Service Account token in pod
  automountServiceAccountToken: true

  serviceAccount:
    # -- Specifies whether a service account should be created
    create: true
    # -- Annotations to add to the service account
    annotations: {}
    # -- The name of the service account to use.(If not set and create is true, a name is generated using the fullname template)
    name: ""

  clusterRoleBinding:
    # -- Specified whether a cluster role binding should be created
    create: true
    # -- Set name of the Cluster Role with limited permissions from you cluster
    # for example - clusterRoleName: user-ro
    clusterRoleName: cluster-admin
    # -- Annotations to add to the cluster role binding
    annotations: {}

  # -- Annotations to add to the deployment
  deploymentAnnotations: {}

  # -- Annotations to add to the pod
  podAnnotations: {}

  # -- Labels to add to the pod
  podLabels: {}

  # -- Headlamp pod's Security Context
  podSecurityContext:
    {}
    # fsGroup: 2000

  # -- Headlamp containers Security Context
  securityContext:
    # capabilities:
    #   drop:
    #   - ALL
    # readOnlyRootFilesystem: true
    runAsNonRoot: true
    privileged: false
    runAsUser: 100
    runAsGroup: 101
  # Uses these defaults if this is empty.
  #   allowPrivilegeEscalation: false
  #   runAsNonRoot: true
  #   seccompProfile:
  #     type: RuntimeDefault
  #   capabilities:
  #     drop:
  #       - ALL


  service:
    # -- Annotations to add to the service
    annotations: {}
    # -- Kubernetes Service type
    type: ClusterIP
    # -- Kubernetes Service port
    port: 80
    # -- Kubernetes Service clusterIP
    clusterIP: ""
    # -- Kubernetes Service loadBalancerIP
    loadBalancerIP: ""
    # -- Kubernetes Service loadBalancerSourceRanges
    loadBalancerSourceRanges: []
    # -- Kubernetes Service Nodeport
    nodePort: null

  # -- Headlamp containers volume mounts
  volumeMounts:
    # Plugin mounts as a subdir of pluginsDir (/headlamp/plugins) so Headlamp
    # detects it as the `enbuild-theme` plugin (main.js + package.json).
    - mountPath: /headlamp/plugins/enbuild-theme
      name: headlamp-plugins
      readOnly: true

    - mountPath: /home/headlamp/.config/Headlamp/kubeconfigs/config
      name: kubeconfig
      readOnly: true
      subPath: config

  # -- Headlamp pod's volumes
  volumes:
    # ENBUILD theme plugin — chart-managed ConfigMap (folded in 2026-05-19,
    # replacing the external-image init-container + PVC). Static CM name
    # because subchart values can't template {{ .Release.Name }}.
    - name: headlamp-plugins
      configMap:
        name: headlamp-plugin-enbuild-theme
    # Chart-managed kubeconfig CM (folded 2026-05-19). Holds `main` + every
    # spoke listed in .Values.headlamp.spokes. Static CM name because
    # subchart values can't template {{ .Release.Name }}.
    - name: kubeconfig
      configMap:
        name: headlamp-kubeconfigs
        items:
          - key: config
            path: config

  persistentVolumeClaim:
    # -- Enable Persistent Volume Claim
    enabled: true
    # -- Annotations to add to the persistent volume claim (if enabled)
    annotations:
      {}
    # -- accessModes for the persistent volume claim, eg: ReadWriteOnce, ReadOnlyMany, ReadWriteMany etc.
    accessModes:
      - ReadWriteOnce
    # -- size of the persistent volume claim, eg: 10Gi. Required if enabled is true.
    size: "1Gi"
    # -- storageClassName for the persistent volume claim.
    storageClassName: ""
    # -- selector for the persistent volume claim.
    selector: {}
    # -- volumeMode for the persistent volume claim, eg: Filesystem, Block.
    volumeMode: ""

  ingress:
    # -- Enable ingress controller resource
    enabled: false
    # -- Annotations for Ingress resource
    annotations:
      {}
      # kubernetes.io/tls-acme: "true"

    # -- Additional labels to add to the Ingress resource
    labels: {}
      # app.kubernetes.io/part-of: traefik
      # environment: prod

    # -- Ingress class name. replacement for the deprecated "kubernetes.io/ingress.class" annotation
    ingressClassName: ""

    # -- Hostname(s) for the Ingress resource
    # Please refer to https://kubernetes.io/docs/reference/kubernetes-api/service-resources/ingress-v1/#IngressSpec for more information.
    hosts:
      []
      # - host: chart-example.local
      #   paths:
      #   - path: /
      #     type: ImplementationSpecific
    # -- Ingress TLS configuration
    tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local

  # -- CPU/Memory resource requests/limits
  resources:
    {}
    # We usually recommend not to specify default resources and to leave this as a conscious
    # choice for the user. This also increases chances charts run on environments with little
    # resources, such as Minikube. If you do want to specify resources, uncomment the following
    # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi

  # -- Node labels for pod assignment
  nodeSelector: {}

  # -- Toleration labels for pod assignment
  tolerations: []

  # -- Affinity settings for pod assignment
  affinity: {}

  # Plugin Manager Sidecar Container Configuration
  pluginsManager:
    # -- Enable plugin manager
    enabled: false
    # -- Plugin configuration file name
    configFile: "plugin.yml"
    # -- Plugin configuration content in YAML format. This is required if plugins.enabled is true.
    configContent: ""
    # -- Base node image to use
    baseImage: node:lts-alpine
    # -- Headlamp plugin package version to install
    version: latest
    # -- Plugin manager env variable configuration
    # env:
    # - name: HTTPS_PROXY
    #   value: "proxy.example.com:8080"
    # -- Specify resrouces
    # resources:
    #   requests:
    #     cpu: "500m"
    #     memory: "2048Mi"
    #   limits:
    #     cpu: "1000m"
    #     memory: "4096Mi"
    # If omitted, the plugin manager will inherit the global securityContext
    securityContext:
      {}
      # runAsUser: 1001
      # runAsNonRoot: true
      # allowPrivilegeEscalation: false
      # readOnlyRootFilesystem: true
      # capabilities:
      #   drop:
      #     - ALL

  podDisruptionBudget:
    # -- enable PodDisruptionBudget
    # ref: https://kubernetes.io/docs/concepts/workloads/pods/disruptions/
    enabled: false
    # @schema
    # type: [null, integer, string]
    # @schema
    # -- Minimum number/percentage of pods that should remain scheduled.
    # When it's set, maxUnavailable must be disabled by `maxUnavailable: null`
    minAvailable: 0
    # @schema
    # type: [null, integer, string]
    # @schema
    # -- Maximum number/percentage of pods that may be made unavailable
    maxUnavailable: null
    # @schema
    # type: [null, string]
    # @schema
    # -- How are unhealthy, but running, pods counted for eviction
    unhealthyPodEvictionPolicy: null

  # -- Additional Kubernetes manifests to be deployed. Include the manifest as nested YAML.
  extraManifests: []
  # - |
  #   apiVersion: v1
  #   kind: ConfigMap
  #   metadata:
  #     name: my-config
  #   data:
  #     key: value
  # - |
  #   apiVersion: v1
  #   kind: ConfigMap
  #   metadata:
  #     name: my-config-too
  #   data:
  #     key: value

