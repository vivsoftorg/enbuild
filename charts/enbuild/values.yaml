  image:
    repository: enbuild-staging/vivsoft-platform-ui/enbuild-ctf
  replicas: 1
  service_type: ClusterIP
  debug: true
  cors_origins: "['http://localhost:5173','http://localhost:5000','http://localhost:3000']"
  log_level: "DEBUG"
  aws_region: "us-east-1"
