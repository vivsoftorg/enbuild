## @section ENBUILD Backend Services parameters
## @param enbuildBk.image.repository  Container repository for enbuildBk
## @param enbuildBk.image.tag  [nullable] Container image tag. Skip to use the HelmChart appVersion as Image Tag
## @param enbuildBk.replicas Container enbuildBk Replicas
## @param enbuildBk.service_type  enbuildBk service_type
## @param enbuildBk.encryption_key  encryption_key to be used by Backend
## @param enbuildBk.gitlabPat.existingSecret  Name of an operator-managed Secret carrying GITLAB_TOKEN (and optionally GITLAB_HOST). When set, the deployment adds an envFrom for that secret; the inline GITLAB_TOKEN from enbuildConsumer.gitlab.token is omitted to avoid duplicate envvars. Use this in P1 environments where the PAT is provisioned out-of-band and rotated separately. Backwards-compatible default: empty (uses inline values).
## @param enbuildBk.exportSigning.existingSecret  Name of an operator-managed Secret carrying SIEM_SIGNING_KEY (PEM-encoded ECDSA P-256 private key) for the CCM-32 audit export bundle (EN-1237). Strongly preferred over privateKeyPem for production. Backwards-compatible default: empty.
## @param enbuildBk.exportSigning.privateKeyPem  Inline PEM private key used to sign /audit/export-bundle responses. Dev/test only; production should use existingSecret. Multiline string. Backwards-compatible default: empty (signing disabled; bundle returns signed=false).
enbuildBk:
  image:
    repository: enbuild-staging/vivsoft-platform-ui/enbuild-backend
  replicas: 1
  service_type: ClusterIP
  encryption_key: "encryption_key"
  ## P1 CCM Console — Headlamp K8sApiProxy fallback actor (BE 099 demo-mode
  ## hook, see backend/microservices/enbuild/src/kubeProxy/kubeProxy.controller.ts).
  ## When Headlamp's HTTP requests carry no X-Actor-Email/JWT, the
  ## KubeProxyController falls back to this value before applying tenancy
  ## (project membership). Set to an email that's a member of the project
  ## owning the demo cluster. Empty = hardcoded controller default
  ## (`alice@example.com`). Keeps `kubectl set env` patches from getting
  ## reverted on the next helm-upgrade / auto-reconcile.
  kubeProxyFallbackActor: ""
  ## P1 CCM Console — hub-side gRPC AgentGateway. Opt-in. When grpcEnabled
  ## is true, the chart renders a separate Service (<release>-enbuild-bk-grpc)
  ## targeting port 8443 on the bk pods, and adds a `grpc` containerPort to
  ## the bk Deployment. mTLS CA bundle mount is gated separately on
  ## mtls.caSecretRef being non-empty (operator pre-creates the Secret).
  grpcEnabled: false
  grpcPort: 8443
  grpcServiceType: ClusterIP   # ClusterIP | NodePort | LoadBalancer
  mtls:
    caSecretRef: ""            # K8s Secret name (in this namespace) holding the mTLS CA bundle; empty = mTLS not enforced
  ## P1 CCM Console — Istio VirtualService routing /enbuild.v1.* path prefix
  ## from an existing public Gateway to the gRPC Service. Opt-in alongside
  ## grpcEnabled. See charts/enbuild/templates/enbuild-bk-grpc-virtualservice.yaml.
  grpcVirtualService:
    enabled: false
    host: ""                   # operator override per environment (e.g. enbuild-ib-vendor13.staging.dso.mil)
    gateway: ""                # e.g. istio-gateway/public-ingressgateway
  ## P1 CCM Console — operator-managed secret support (backwards-compatible).
  ## See template comments in backend-secret.yaml + enbuild-bk.yaml.
  gitlabPat:
    existingSecret: ""
  exportSigning:
    existingSecret: ""
    privateKeyPem: ""
  securityTooling:
    ## @param enbuildBk.securityTooling.existingSecret Name of an operator-managed Secret carrying hub-self CCM-13d security-tooling env (TWISTLOCK_API_URL/USERNAME/PASSWORD, ANCHORE_API_URL/USERNAME/PASSWORD, FALCO_CLUSTER_ID, FALCO_WEBHOOK_SECRET, OPA_GATEKEEPER_ENABLED, FALCO_AUDIT_LANE). Added as an envFrom on the bk container. Keeps Big Bang tool creds out of Helm values + rotatable out-of-band; bridges them cross-namespace into the bk pod. Backwards-compatible default: empty (hub-self reports those sources unavailable until set).
    existingSecret: ""
  ## BE 031 (production hardening per ADR-0001 risks-accepted): bk
  ## replicas + Redis-backed agent registry. When `agentGateway.replicas`
  ## is >1, the bk Deployment runs multiple replicas; agents register
  ## with whichever replica accepts their gRPC stream, and the registry
  ## must be Redis-backed so RPC dispatch works across replicas. The
  ## chart deliberately does NOT vendor a Redis subchart — operators
  ## point `agentGateway.redisUrl` at an existing Redis (Bitnami chart
  ## pre-installed alongside, or a managed Redis). Single-replica
  ## prototype path stays unchanged when `agentGateway.replicas: 1`
  ## (default) — registry stays in-process per BE 002.
  agentGateway:
    replicas: 1
    redisUrl: ""                 # e.g. redis://redis-master.enbuild.svc.cluster.local:6379. Required when replicas>1.
    ## Log format selector. 'json' for production SIEM ingestion (CCM-11);
    ## 'pretty' for dev. Bk reads ENBUILD_LOG_FORMAT env at boot.
    logFormat: pretty            # 'pretty' | 'json'
    ## BE 032 — observability surface (Prometheus + Grafana + AlertManager).
    ## ServiceMonitor + PrometheusRule + Grafana ConfigMap render only when
    ## the corresponding sub-flag is on; operators flip them once the
    ## Prometheus Operator + Grafana sidecar are installed in the cluster.
    ## Bk's /api/metrics endpoint is always available; the ServiceMonitor
    ## just gives Prometheus the scrape config.
    observability:
      serviceMonitor:
        enabled: false           # requires Prometheus Operator CRDs
        interval: 30s
        scrapeTimeout: 10s
        path: /api/metrics
        labels: {}               # operator-overridable Prometheus selector labels
      prometheusRule:
        enabled: false           # requires Prometheus Operator CRDs
        labels: {}
      grafanaDashboard:
        enabled: false           # requires Grafana sidecar with dashboard discovery
        ## Grafana dashboard sidecar discovers ConfigMaps with this label;
        ## defaults to the BB Grafana convention. Override per environment.
        sidecarLabel: grafana_dashboard
        sidecarLabelValue: "1"

## @section PKI — hub-side cert-manager-native CA chain for spoke mTLS
## Stage 2 of the 3-stage P1 CCM PKI rollout. Default OFF; vendor13-ib values
## overlay flips on. **Catalog 011 pivot**: dropped the in-cluster step-ca
## subchart in favor of a cert-manager-native 3-step chain (matches what
## catalog 010 kind smoke proved end-to-end):
##
##   1. SelfSigned ClusterIssuer  (`<release>-selfsigned-bootstrap`)
##         ↓ issues
##   2. CA Certificate            (`<release>-enbuild-ca`, isCA: true)
##                                stored in `enbuild-ca-tls` Secret in cert-manager ns
##         ↓ backs
##   3. CA ClusterIssuer          (`enbuild-hub-issuer` by default)
##         ↓ issues
##   4. Hub gRPC server Certificate stored in `enbuild-hub-grpc-tls` Secret
##         ↓ mounted at /etc/enbuild/hub-tls/
##   5. bk Deployment with ENBUILD_HUB_MTLS_ENABLED=true reads tls.crt/tls.key/ca.crt
##      and validates spoke client certs against ca.crt (BE 016 + 017).
##
## Spoke client certs (Stage 3, catalog 009 chart) are issued by either:
##   - the same enbuild-hub-issuer (Design A), or
##   - per-spoke selfSigned issuers whose CAs are appended to the bundle (Design B).
## See evidence/catalog-009-stage3-prep/findings.md for the design tradeoff.
pki:
  enabled: false
  ## Logical name for the issuer the bk Deployment / spoke charts reference.
  issuerName: enbuild-hub-issuer

  ## ConfigMap holding the spoke-side CA bundle. Default name matches catalog 009's
  ## chart default. Populated post-deploy with the CA cert (Phase 4 init job or
  ## operator) so spokes trust the hub's chain.
  caBundleConfigMap: enbuild-spoke-ca-bundle

  ## CA Certificate that backs the CA ClusterIssuer.
  ## Lives in cert-manager's --cluster-resource-namespace (default `cert-manager`)
  ## so the CA ClusterIssuer can reference it cluster-wide.
  caCert:
    secretName: enbuild-ca-tls
    namespace: cert-manager
    duration: 8760h    # 1 year — CA refreshes annually; downstream certs refresh quarterly
    renewBefore: 720h  # 30d
    ## Catalog 020 (chart bug-3 fix): CA's CN MUST differ from the leaf cert's
    ## CN, otherwise OpenSSL/BoringSSL chain validation rejects with
    ## "self signed certificate in chain". Default `enbuild-hub-ca`; operator
    ## overlay may rename per environment.
    commonName: enbuild-hub-ca

  ## Hub gRPC server cert issued by the CA ClusterIssuer. Mounted by bk
  ## at /etc/enbuild/hub-tls/.
  hubServerCert:
    secretName: enbuild-hub-grpc-tls
    duration: 2160h    # 90d
    renewBefore: 360h  # 15d
    dnsNames:
      - enbuild-ib-vendor13.staging.dso.mil
      - enbuild-bk-grpc.enbuild.svc.cluster.local

  ## BE 029 (Path B per ADR-0005): Istio AuthorizationPolicy + XFCC.
  ## When enabled (production path), Istio's public-ingressgateway
  ## terminates client TLS at the edge, validates the cert against the
  ## CA bundle, and forwards the cert details to bk via the
  ## X-Forwarded-Client-Cert header. bk's `extractPeerCertCNFromXfcc`
  ## parses this with two trust defenses (SANITIZE_SET via EnvoyFilter +
  ## internal-source marker check). Set `false` for kind-smoke + dev
  ## paths where bk's :8443 listener handles mTLS directly (BE 016/017).
  istioAuthorizationPolicy:
    enabled: false
## (BE 047 / ADR-0019) Vault PKI integration — Design C alternative trust
## chain. Off by default; opt-in deploys point cert-manager at a Vault
## PKI mount instead of the Design A hub CA ClusterIssuer. Operator-grade
## key custody + central CRL revocation + audit log.
##
## Production rollout gated on user authorization per
## `feedback_supervisor_phase4_authority.md`.
vaultPki:
  enabled: false
  ## Vault server URL — typically the BB stack's Vault svc address.
  vaultAddr: https://vault.bigbang.svc:8200
  ## PKI engine mount path inside Vault.
  mountPath: enbuild-pki
  ## cert-manager Issuer name (referenced by hub + spoke Certificates
  ## via `issuerRef.name` once Design C is enabled).
  issuerName: enbuild-vault-issuer
  ## Optional CA bundle Secret cert-manager trusts when calling Vault.
  ## Omit for Vault deployments served by a public CA / cluster-trusted
  ## intermediate.
  caBundleSecret: {}
    # name: vault-ca-bundle
    # key: ca.crt
  role:
    name: enbuild-spoke
    defaultTtl: 720h    # 30d default — auto-renewal at 25% TTL remaining
    maxTtl: 2160h       # 90d max — guards against role drift
    allowedCommonNames: "*.spoke.enbuild.local"
  ## Vault Kubernetes auth — cert-manager + bk both auth this way.
  k8sAuth:
    role: enbuild-pki-issuer
    mountPath: /v1/auth/kubernetes
    tokenSecretName: ""   # defaults to <release>-vault-token at template time
  ## Optional one-time bootstrap Job that mounts the PKI engine + writes
  ## the role. Disable when operators run the Vault CLI flow manually.
  bootstrapJob:
    enabled: false
    image: hashicorp/vault:1.15
    tokenSecret: vault-bootstrap-token
  ## (BE 048) Optional Vault Transit engine for cosign-style image
  ## signing. Off by default; opt-in via transitEngine.enabled.
  ## Backs the catalog 027/028 IB submission Phase B (Vault-backed
  ## cosign key) flow + admin POST /api/v1/admin/cosign-sign endpoint.
  transitEngine:
    enabled: false
    mountPath: enbuild-cosign
    ## One ed25519 key per IB submission image. Operators may add more.
    cosignKeys:
      - agent
      - audit-tail
      - bk

    ## Catalog 020 (chart bug-2 fix): namespace + selector parameterized so
    ## operators can target the actual gateway pod set in their environment.
    ## Defaults (when overlay omits) match istioctl-default install:
    ##   namespace: istio-system
    ##   selectorMatchLabels: {istio: ingressgateway}
    ## vendor13-ib's BB-managed gateway is in `istio-gateway` ns with selector
    ## `app: public-ingressgateway` — overlay sets both per environment.
    ## NOTE: defaults are applied at TEMPLATE TIME (via `default`), NOT here in
    ## values.yaml — Helm `--values` overlays deep-merge maps, so a default
    ## here would merge with the overlay (not replace), producing wrong selectors.
    namespace: ""
    selectorMatchLabels: {}

