# vendor13-ib Stage 2 (catalog 011 PKI prep — pivoted from step-ca to cert-manager-native).
# Layered ON TOP of the existing vendor13-ib values that are already in the
# helm release (from catalog 007 Phase 2 helm-upgrade). Use with:
#   helm upgrade enbuild-ib ./charts/enbuild --reuse-values \
#     -f vendor13-ib-stage2-values.yaml --atomic
#
# Stage 2 acceptance after Phase 4 GO + cert-manager prereq:
#   - SelfSigned ClusterIssuer renders
#   - CA Certificate renders + reaches Ready=True (Secret enbuild-ca-tls in cert-manager ns)
#   - CA ClusterIssuer renders + Ready=True
#   - Hub gRPC server Certificate (CN=enbuild-ib-vendor13.staging.dso.mil) renders
#     + Secret enbuild-hub-grpc-tls populated with tls.crt/tls.key/ca.crt
#   - bk Deployment mounts /etc/enbuild/hub-tls (mount-only — BE 016 consumes when env=true)
#
# Catalog 011 dropped the step-ca subchart due to a TTY init bug in
# smallstep/step-ca:0.27.5 (catalog 010 findings.md Issue 1). The
# cert-manager-native chain matches what catalog 010 kind smoke proved.

pki:
  enabled: true
  issuerName: enbuild-hub-issuer
  caBundleConfigMap: enbuild-spoke-ca-bundle
  caCert:
    secretName: enbuild-ca-tls
    namespace: cert-manager
    duration: 8760h    # 1y
    renewBefore: 720h  # 30d
    # Catalog 020 (chart bug-3 fix): CA's CN MUST differ from leaf CN.
    commonName: enbuild-hub-ca
  hubServerCert:
    secretName: enbuild-hub-grpc-tls
    duration: 2160h    # 90d
    renewBefore: 360h  # 15d
    dnsNames:
      - enbuild-ib-vendor13.staging.dso.mil
      - enbuild-bk-grpc.enbuild.svc.cluster.local
  # Catalog 020 (chart bug-2 fix): vendor13-ib's BB-managed gateway lives
  # in `istio-gateway` ns with selector `app: public-ingressgateway` (NOT
  # the istioctl-default `istio-system` + `istio: ingressgateway`).
  istioAuthorizationPolicy:
    enabled: false   # operator flips on at PHASE 4 GO retry (catalog 021 / future)
    namespace: istio-gateway
    selectorMatchLabels:
      app: public-ingressgateway
