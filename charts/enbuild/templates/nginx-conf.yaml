apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-nginx-conf
  labels:
{{- include "enbuild-helm-chart.labels" . | nindent 4 }}
data:
  override.conf: |-
    # blank override.conf
    # Intentionally left empty


  default.conf: |-
    map $http_upgrade $connection_upgrade {
      default upgrade;
      '' close;
    }

    server {
      listen 8080 default_server;
      # WHY "localhost" is in server_name (DO NOT REMOVE):
      # The Iron Bank (and stock) nginx base image ships a default server block
      # in /etc/nginx/nginx.conf with `server_name localhost`, also listening on
      # 8080. nginx selects server blocks by Host header before falling back to
      # default_server, so any request with Host: localhost (i.e. every kubectl
      # port-forward) matches the base block — which has NO /enbuild-bk/,
      # /enbuild-user/, /headlamp/ location entries. The UI loads but every
      # API call returns the React 404 HTML, the frontend tries to parse that
      # as JSON, and crashes with "Unexpected token '<'". First observed on
      # vendor13-ib (2026-04-20). Adding "localhost" here lets this block tie
      # the base block on hostname match and win on `default_server`.
      # Production access via Istio gateway uses a non-localhost Host header
      # and is unaffected by this line.
      server_name localhost _;

      include override.conf;

      proxy_pass_header Authorization;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      location /enbuild-bk/ {
        proxy_pass http://{{ .Release.Name }}-enbuild-backend/;
      }

      location /enbuild-user/ {
        proxy_pass http://{{ .Release.Name }}-enbuild-user/;
      }

{{- if .Values.lightning_features.deploy_lightning.ai_lightning }}
      location /enbuild-ai/ {
        proxy_pass http://{{ .Release.Name }}-enbuild-ai/;
      }
{{- end }}

{{- if .Values.lightning_features.operations_lightning.headlamp }}
      # ENBUILD Headlamp white-label (folded into the chart so helm-upgrade
      # doesn't wipe the operator-applied patch — same carryover discipline
      # as the /p1-ccm-console/ block below; see OPERATIONS_GOTCHAS §8/§9).
      # Headlamp's plugin SDK is bridged and CANNOT touch <head>/title/favicon
      # from plugin code (§8) — so the brand erasure + sidebar→top-nav overlay
      # is injected here at the FE nginx layer. Brand assets are served from
      # the headlamp-brand ConfigMap mounted on the enbuild-ui pod
      # (templates/enbuild-ui.yaml + templates/headlamp-brand-configmap.yaml).
      # sub_filter match strings are verbatim from the served Headlamp
      # index.html; re-capture + update if the Headlamp image bumps.
      location /headlamp-brand/ {
        alias /usr/share/nginx/headlamp-brand/;
        access_log off;
        add_header Cache-Control "public, max-age=300";
      }

      location /headlamp/ {
        proxy_pass http://{{ .Release.Name }}-headlamp/headlamp/;

        # sub_filter can't rewrite a gzipped upstream — force plain HTML.
        proxy_set_header Accept-Encoding "";
        sub_filter_once off;

        sub_filter '<title>Headlamp</title>' '<title>ENBUILD Cluster Console</title>';
        sub_filter '<meta name="description" content="Headlamp: Kubernetes Web UI" />' '<meta name="description" content="ENBUILD Cluster Console" />';

        sub_filter '<link rel="icon" href="/headlamp/favicon.ico" />' '<link rel="icon" href="/headlamp-brand/favicon.ico" />';
        sub_filter '<link rel="apple-touch-icon" sizes="180x180" href="/headlamp/apple-touch-icon.png" />' '<link rel="apple-touch-icon" sizes="180x180" href="/headlamp-brand/favicon.ico" />';
        sub_filter '<link rel="icon" type="image/png" sizes="32x32" href="/headlamp/favicon-32x32.png" />' '<link rel="icon" href="/headlamp-brand/favicon.ico" />';
        sub_filter '<link rel="icon" type="image/png" sizes="16x16" href="/headlamp/favicon-16x16.png" />' '';
        sub_filter '<link rel="mask-icon" href="/headlamp/safari-pinned-tab.svg" color="#5bbad5" />' '';
        sub_filter '<link rel="apple-touch-icon" href="logo192.png" />' '';

        sub_filter '</head>' '<link rel="stylesheet" href="/headlamp-brand/whitelabel.css"><script src="/headlamp-brand/whitelabel.js"></script></head>';
      }

{{- end }}

{{- if .Values.lightning_features.operations_lightning.monitoring }}
      location /grafana/ {
        proxy_pass http://{{ .Release.Name }}-grafana/;
        rewrite ^/grafana/(.*) /$1 break;
     }
{{- end }}

{{- if .Values.lightning_features.develop_lightning.application }}
      location /bolt/ {
          proxy_pass http://{{ .Release.Name }}-enbuild-bolt/bolt/;
          proxy_set_header Host $host;
          proxy_set_header Connection '';
      }
{{- end }}

{{- if .Values.lightning_features.secure_lightning.ctf }}
      location /ctf/ {
          proxy_pass http://{{ .Release.Name }}-enbuild-ctf/;
          proxy_set_header Host $host;
          proxy_set_header Connection '';
      }
{{- end }}

{{- if .Values.lightning_features.develop_lightning.models }}
      location /jupyter/ {
          proxy_pass http://proxy-public/jupyter/;

          # --- WebSocket support ---
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;

          # --- Preserve headers ---
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;

          # --- Long timeouts for notebook kernels ---
          proxy_read_timeout 3600;
          proxy_send_timeout 3600;

          # --- Rewrite hub-related paths ---
          proxy_redirect /hub/ /jupyter/hub/;
          proxy_cookie_path /hub/ /jupyter/hub/;
          sub_filter 'href="/hub/' 'href="/jupyter/hub/';
          sub_filter 'src="/hub/' 'src="/jupyter/hub/';
          sub_filter_once off;
      }
{{- end }}

      # P1 CCM Console SPA deep-link fallback (B4 nginx fix).
      # Without this block, hard-refreshes / direct URL hits to client-side
      # React Router routes under /p1-ccm-console/* return 404. The in-cluster
      # ConfigMap on vendor13-ib has carried this patch since the prototype's
      # Phase 6; folded into the chart at 0.0.44-pkiprep.0 so helm-upgrade
      # doesn't wipe the operator-applied patch. See playbook.md
      # "ConfigMap patch (rare)" section for the carryover history.
      location /p1-ccm-console/ {
        try_files $uri $uri/ /p1-ccm-console/index.html;
      }
    } # end of server block
