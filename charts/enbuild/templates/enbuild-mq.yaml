apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-enbuild-mq
  labels:
    app: mq
    app.kubernetes.io/component: mq
  {{- include "enbuild-helm-chart.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.enbuildConsumer.replicas }}
  selector:
    matchLabels:
      app: mq
      app.kubernetes.io/component: mq
    {{- include "enbuild-helm-chart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app: mq
        app.kubernetes.io/component: mq
      {{- include "enbuild-helm-chart.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - env:
        - name: MONGODB_ENDPOINT
          value: mongodb://$(MONGO_INITDB_ROOT_USERNAME):$(MONGO_INITDB_ROOT_PASSWORD)@$(MONGO_SERVER)
        envFrom:
        - secretRef:
            name: {{ .Release.Name }}-mongo-secrets
        - secretRef:
            name: {{ .Release.Name }}-backend-secret
        # Image registry: per-service `enbuildConsumer.image.registry` override
        # wins over the chart-wide `global.image.registry`. Unset by default →
        # falls back to global, preserving every existing deploy's behavior.
        # Use case: vendor13-ib temporarily points at the GitLab staging
        # registry to consume a fix while waiting for the Iron Bank rebuild to
        # ship the same change. See examples/enbuild/values-vendor13-ib.yaml
        # for the override shape + intended temporary lifecycle.
        image: {{ default .Values.global.image.registry .Values.enbuildConsumer.image.registry }}/{{ .Values.enbuildConsumer.image.repository }}:{{ default .Chart.AppVersion (default .Values.global.AppVersion .Values.enbuildConsumer.image.tag) }}
        imagePullPolicy: {{ .Values.global.image.pullPolicy }}
        # WHY this default probe shells out and prefers /usr/bin/node:
        # The Iron Bank enbuild-mq image
        # (registry1.dso.mil/ironbank/vivsoft/enbuild/enbuild-mq) ships
        # multiple `node` binaries; only /usr/bin/node loads libatomic.so.1
        # correctly. A naive `node src/queue/testConnection.js` probe resolves
        # the wrong binary, exec returns non-zero, and the kubelet kills the
        # pod every probe period. First observed on vendor13-ib (2026-04-20):
        # 45 restarts in ~4 hours before the workaround was applied.
        # The PUBLIC GitLab-registry image
        # (registry.gitlab.com/enbuild-staging/vivsoft-platform-ui/enbuild-mq-consumer)
        # has NO /usr/bin/node — node lives at /usr/local/bin/node and PATH
        # lookup is correct. Hardcoding /usr/bin/node would break that image
        # (verified 2026-05-04: CI's kind smoke test recorded 5 restarts in
        # 3 probe periods).
        # The conditional below handles both: prefer /usr/bin/node when it
        # exists (Iron Bank, avoids broken-binary-on-PATH), otherwise let
        # PATH find node (public image, any standard Node.js base image).
        # Operators who want a different probe shape (httpGet, tcpSocket,
        # longer timeouts, etc.) can override via
        # .Values.enbuildConsumer.livenessProbe.
        livenessProbe:
          {{- with .Values.enbuildConsumer.livenessProbe }}
          {{- toYaml . | nindent 10 }}
          {{- else }}
          failureThreshold: 3
          exec:
            command:
            - /bin/sh
            - -c
            - 'if [ -x /usr/bin/node ]; then exec /usr/bin/node src/queue/testConnection.js; else exec node src/queue/testConnection.js; fi'
          initialDelaySeconds: 3
          periodSeconds: 60
          successThreshold: 1
          timeoutSeconds: 10
          {{- end }}
        # readinessProbe:
        #   failureThreshold: 3
        #   initialDelaySeconds: 3
        #   periodSeconds: 60
        #   successThreshold: 1
        #   timeoutSeconds: 10
        #   exec:
        #     command:
        #     - node
        #     - src/queue/testConnection.js
        name: enbuild-mq
{{- with .Values.enbuildConsumer.args }}
        args:
{{ toYaml . | indent 10 }}
{{- end }}
{{- with .Values.enbuildConsumer.command }}
        command:
{{ toYaml . | indent 10 }}
{{- end }}
        # ports:
        # - containerPort: 8080
        resources: {{- toYaml .Values.enbuildConsumer.resources | nindent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
          runAsGroup: 1000
          runAsNonRoot: true
          runAsUser: 1000
{{- if .Values.global.image.registry_credentials }}
      imagePullSecrets:
        - name: {{ .Release.Name }}-image-pull-secret
{{- end }}
---
