apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-enbuild-backend
  labels:
    app: bk
    app.kubernetes.io/component: backend
  {{- include "enbuild-helm-chart.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.enbuildBk.replicas }}
  selector:
    matchLabels:
      app: bk
      app.kubernetes.io/component: backend
    {{- include "enbuild-helm-chart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app: bk
        app.kubernetes.io/component: backend
      {{- include "enbuild-helm-chart.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - env:
        - name: MONGODB_ENDPOINT
          value: mongodb://$(MONGO_INITDB_ROOT_USERNAME):$(MONGO_INITDB_ROOT_PASSWORD)@$(MONGO_SERVER)
        {{- /*
          BE 099 KubeProxyController demo-mode fallback actor. When
          Headlamp's HTTP requests carry no X-Actor-Email/JWT the
          controller falls back to this email before TenancyGuard
          (project-membership) runs. Folded into the chart 2026-05-19
          so the env survives helm-upgrade — prior `kubectl set env`
          patches were getting auto-reverted on rollouts. Skipped when
          empty so unset == hardcoded controller default
          (`alice@example.com`).
        */ -}}
        {{- with .Values.enbuildBk.kubeProxyFallbackActor }}
        - name: KUBE_PROXY_FALLBACK_ACTOR
          value: {{ . | quote }}
        {{- end }}
        envFrom:
        - secretRef:
            name: {{ .Release.Name }}-mongo-secrets
        - secretRef:
            name: {{ .Release.Name }}-backend-secret
        {{- /*
          P1 CCM Console — operator-managed secret support. When the
          operator pre-creates a Secret carrying GITLAB_TOKEN (and
          optionally GITLAB_HOST) and sets `gitlabPat.existingSecret`,
          its keys override the inline values from backend-secret. Lets
          P1 environments rotate the GitLab PAT without touching values.
        */ -}}
        {{- with .Values.enbuildBk.gitlabPat.existingSecret }}
        - secretRef:
            name: {{ . }}
        {{- end }}
        {{- /*
          P1 CCM Console — cosign export signing key (EN-1237). Operator
          pre-creates a Secret with key SIEM_SIGNING_KEY (PEM-encoded
          ECDSA P-256 private key). Strongly preferred over the inline
          `privateKeyPem` path for production.
        */ -}}
        {{- with .Values.enbuildBk.exportSigning.existingSecret }}
        - secretRef:
            name: {{ . }}
        {{- end }}
        {{- /*
          P1 CCM Console — hub-self security tooling env (CCM-13d). Operator
          pre-creates a Secret carrying TWISTLOCK_API_URL/USERNAME/PASSWORD,
          ANCHORE_API_URL/USERNAME/PASSWORD, FALCO_CLUSTER_ID,
          FALCO_WEBHOOK_SECRET, OPA_GATEKEEPER_ENABLED, FALCO_AUDIT_LANE.
          Keeps Big Bang Twistlock/Anchore creds out of Helm values and
          rotatable out-of-band; also bridges them cross-namespace into
          the bk pod (creds live in the twistlock/anchore namespaces).
          Same operator-managed-secret idiom as gitlabPat/exportSigning.
        */ -}}
        {{- /* nil-safe: under `helm upgrade --reuse-values` the prior release's
           values predate this key, so .Values.enbuildBk.securityTooling is nil.
           default (dict) guards the dereference (every existing release). */ -}}
        {{- with (default (dict) .Values.enbuildBk.securityTooling).existingSecret }}
        - secretRef:
            name: {{ . }}
        {{- end }}
        # Image registry: per-service `enbuildBk.image.registry` override
        # wins over the chart-wide `global.image.registry`. Unset by default →
        # falls back to global, preserving every existing deploy's behavior.
        # Use case: vendor13-ib temporarily points at the GitLab staging
        # registry to consume a fix while waiting for the Iron Bank rebuild to
        # ship the same change. See examples/enbuild/values-vendor13-ib.yaml
        # for the override shape + intended temporary lifecycle.
        image: {{ default .Values.global.image.registry .Values.enbuildBk.image.registry }}/{{ .Values.enbuildBk.image.repository }}:{{ default .Chart.AppVersion (default .Values.global.AppVersion .Values.enbuildBk.image.tag) }}
        imagePullPolicy: {{ .Values.global.image.pullPolicy }}
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 2
        name: enbuild-bk
        ports:
        - containerPort: 8080
        {{- if .Values.enbuildBk.grpcEnabled }}
        - containerPort: 8443
          name: grpc
        {{- end }}
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 2
        resources: {{- toYaml .Values.enbuildBk.resources | nindent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
          runAsGroup: 1000
          runAsNonRoot: true
          runAsUser: 1000
        {{- if or .Values.enbuildBk.mtls.caSecretRef .Values.pki.enabled }}
        volumeMounts:
        {{- if .Values.enbuildBk.mtls.caSecretRef }}
        - name: agent-mtls-ca
          mountPath: /etc/enbuild-bk/mtls/ca
          readOnly: true
        {{- end }}
        {{- if .Values.pki.enabled }}
        # Stage 2 PKI hub server cert (cert-manager-issued, step-ca-rooted).
        # Mount-only here — BE 016 (Stage 3) un-stubs gRPC server-side mTLS to
        # actually consume tls.crt / tls.key from this path. Until then the
        # mount is a no-op for the running container.
        - name: hub-grpc-tls
          mountPath: /etc/enbuild/hub-tls
          readOnly: true
        {{- end }}
        {{- end }}
{{- if .Values.global.image.registry_credentials }}
      imagePullSecrets:
        - name: {{ .Release.Name }}-image-pull-secret
{{- end }}
      {{- if or .Values.enbuildBk.mtls.caSecretRef .Values.pki.enabled }}
      volumes:
      {{- if .Values.enbuildBk.mtls.caSecretRef }}
      - name: agent-mtls-ca
        secret:
          secretName: {{ .Values.enbuildBk.mtls.caSecretRef }}
      {{- end }}
      {{- if .Values.pki.enabled }}
      - name: hub-grpc-tls
        secret:
          secretName: {{ .Values.pki.hubServerCert.secretName }}
      {{- end }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-enbuild-backend
  labels:
    app: bk
    app.kubernetes.io/component: backend
  {{- include "enbuild-helm-chart.labels" . | nindent 4 }}
spec:
  type: {{ .Values.enbuildBk.service_type }}
  selector:
    app: bk
    app.kubernetes.io/component: backend
  {{- include "enbuild-helm-chart.selectorLabels" . | nindent 4 }}
  ports:
  - port: 80
    protocol: TCP
    targetPort: 8080
