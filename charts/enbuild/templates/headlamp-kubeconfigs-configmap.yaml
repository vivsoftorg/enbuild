{{- if .Values.lightning_features.operations_lightning.headlamp }}
# ENBUILD Headlamp kubeconfig (folded into the chart 2026-05-19 — replaces
# the operator-hand-maintained headlamp-kubeconfigs-<env> CM and the
# `create-kubeconfig` init container that only built `main`).
#
# Survives helm-upgrade / auto-reconcile so operator-applied patches stop
# getting reverted on every BE/headlamp roll. Mounted on the Headlamp pod
# at /home/headlamp/.config/Headlamp/kubeconfigs/config via the headlamp
# subchart values (volumes/volumeMounts in parent values.yaml).
#
# Why static CM name (NOT release-prefixed): the headlamp subchart's
# values.volumes references this CM by literal name and cannot template
# {{ .Release.Name }}. Same constraint as `headlamp-plugin-enbuild-theme`.
#
# Spoke contexts come from .Values.headlamp.spokes (a list of cluster ids).
# Each spoke renders as a context using the shared `anon` user. The BE
# K8sApiProxy strips client Authorization headers before forwarding to the
# spoke agent (BE 099, kubeProxy.controller.ts) so `anon` is a literal
# placeholder, not a secret — tenancy is enforced via the actor
# (X-Actor-Email / JWT / KUBE_PROXY_FALLBACK_ACTOR fallback).
apiVersion: v1
kind: ConfigMap
metadata:
  name: headlamp-kubeconfigs
  labels:
{{- include "enbuild-helm-chart.labels" . | nindent 4 }}
data:
  config: |
    apiVersion: v1
    kind: Config
    clusters:
    - name: main
      cluster:
        certificate-authority: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        server: https://kubernetes.default.svc
{{- range $spoke := .Values.headlamp.spokes | default (list) }}
    - name: {{ $spoke }}
      cluster:
        server: http://{{ $.Release.Name }}-enbuild-backend.{{ $.Release.Namespace }}.svc.cluster.local/api/v1/clusters/{{ $spoke }}/k8s-api
{{- end }}
    contexts:
    - name: main
      context:
        cluster: main
        user: main
{{- range $spoke := .Values.headlamp.spokes | default (list) }}
    - name: {{ $spoke }}
      context:
        cluster: {{ $spoke }}
        user: anon
{{- end }}
    current-context: main
    users:
    - name: main
      user:
        tokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
    - name: anon
      user:
        token: anon
{{- end }}
