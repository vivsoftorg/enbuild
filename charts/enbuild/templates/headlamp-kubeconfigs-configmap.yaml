{{- if .Values.lightning_features.operations_lightning.headlamp }}
# ENBUILD Headlamp kubeconfig (folded into the chart 2026-05-19 — replaces
# the operator-hand-maintained headlamp-kubeconfigs-<env> CM and the
# `create-kubeconfig` init container that only built `main`).
#
# Why static CM name (NOT release-prefixed): the headlamp subchart's
# values.volumes references this CM by literal name and cannot template
# {{ .Release.Name }}. Same constraint as `headlamp-plugin-enbuild-theme`.
#
# -----------------------------------------------------------------------------
# helm-upgrade safety (2026-05-20):
# -----------------------------------------------------------------------------
# The BE's `installAgent.service.ts#reconcileHeadlamp` PATCHes this CM's
# `data.config` every time a cluster is imported or catalog-provisioned —
# adding spoke contexts that the chart's static `.Values.headlamp.spokes`
# list doesn't know about. Without the `lookup` guard below, a `helm upgrade`
# rewrote `data.config` from values and silently dropped every BE-reconciled
# spoke until the next import re-triggered reconcileHeadlamp.
#
# The `lookup` call asks the live cluster whether this CM already exists:
#   - first install (CM absent): renders the seed from .Values.headlamp.spokes
#   - subsequent helm-upgrade (CM present with BE-managed data): keeps
#     the live data.config verbatim, so helm-upgrade is a no-op for content
#   - CM accidentally deleted: next helm-upgrade re-seeds from values
#
# Trade-off: `lookup` only resolves at install/upgrade time when helm has
# cluster access. `helm template` (no cluster) always renders the seed,
# which is fine for CI lint/render validation but means a pure
# `helm template` diff doesn't reflect what would actually deploy.
# -----------------------------------------------------------------------------
{{- $existing := lookup "v1" "ConfigMap" .Release.Namespace "headlamp-kubeconfigs" -}}
{{- $preserveConfig := "" -}}
{{- if and $existing $existing.data (index $existing.data "config") -}}
{{- $preserveConfig = index $existing.data "config" -}}
{{- end -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: headlamp-kubeconfigs
  labels:
{{- include "enbuild-helm-chart.labels" . | nindent 4 }}
data:
{{- if $preserveConfig }}
  # PRESERVED from live CM — owned at runtime by BE reconcileHeadlamp().
  # See "helm-upgrade safety" comment above for the why.
  config: |
{{ $preserveConfig | indent 4 }}
{{- else }}
  # SEEDED from .Values.headlamp.spokes (first install / CM absent path).
  # After BE imports a cluster the BE will PATCH this CM with the full
  # cluster list; subsequent helm-upgrades preserve that via lookup().
  config: |
    apiVersion: v1
    kind: Config
    clusters:
    - name: main
      cluster:
        certificate-authority: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        server: https://kubernetes.default.svc
{{- range $spoke := .Values.headlamp.spokes | default (list) }}
    - name: {{ $spoke }}
      cluster:
        server: http://{{ $.Release.Name }}-enbuild-backend.{{ $.Release.Namespace }}.svc.cluster.local/api/v1/clusters/{{ $spoke }}/k8s-api
{{- end }}
    contexts:
    - name: main
      context:
        cluster: main
        user: main
{{- range $spoke := .Values.headlamp.spokes | default (list) }}
    - name: {{ $spoke }}
      context:
        cluster: {{ $spoke }}
        user: anon
{{- end }}
    current-context: main
    users:
    - name: main
      user:
        tokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
    - name: anon
      user:
        token: anon
{{- end }}
{{- end }}
