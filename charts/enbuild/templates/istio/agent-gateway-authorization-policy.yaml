{{- /*
BE 029 (Path B per ADR-0005): Istio AuthorizationPolicy for the
public-ingressgateway that fronts bk's :8443 agent gateway.

Purpose: Istio's gateway terminates client TLS at the edge, so the bk
pod's mTLS listener never sees the client cert directly. Istio extracts
the validated cert (after TLS handshake) and forwards it as the
X-Forwarded-Client-Cert (XFCC) header. bk's `extractPeerCertCNFromXfcc`
parses this header and binds it to the connecting agent's claimed
clusterId.

Trust hardening (TWO defenses, both required):
  (a) `forward_client_cert_details: SANITIZE_SET` — Istio overwrites
      any caller-supplied XFCC, so attackers can't inject their own
      cert claim. This is Istio's default.
  (b) `x-envoy-original-dst-host` internal-source marker — bk requires
      this header on every routed request as a "this came through the
      gateway" signal. Without it, XFCC is treated as untrusted.

Conditional render: only emits when `pki.enabled: true` AND
`pki.istioAuthorizationPolicy.enabled: true`.

Catalog 020 (chart bug-2 fix): namespace + selector parameterized so
operators target the actual gateway pod set in their environment. BB
deployments live in `istio-gateway` ns with selector `app: <gateway-name>`,
not the istioctl-default `istio-system` + `istio: ingressgateway`.
*/}}
{{- if and .Values.pki.enabled (and .Values.pki.istioAuthorizationPolicy .Values.pki.istioAuthorizationPolicy.enabled) }}
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ include "enbuild-helm-chart.fullname" . }}-agent-gateway
  namespace: {{ .Values.pki.istioAuthorizationPolicy.namespace | default "istio-system" }}
  labels:
    {{- include "enbuild-helm-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent-gateway-authz
spec:
  selector:
    matchLabels: {{- toYaml (.Values.pki.istioAuthorizationPolicy.selectorMatchLabels | default (dict "istio" "ingressgateway")) | nindent 6 }}
  action: ALLOW
  rules:
    # Require an mTLS-authenticated source (source.principal is set from
    # the validated client cert's SPIFFE URI / SAN). `principals: ["*"]`
    # matches any non-empty principal — Istio rejects a `notValues: [""]`
    # check on source.principal at validation time.
    - from:
        - source:
            principals: ["*"]
      to:
        - operation:
            ports: ["8443"]
            paths: ["/enbuild.v1.EnbuildAgent/*"]
---
{{- /*
Companion EnvoyFilter that pins SANITIZE_SET behavior on the gateway's
HTTP connection manager. Without this, Istio's default may be
APPEND_FORWARD which allows a client to prepend its own XFCC hop.

Catalog 020: namespace + workloadSelector parameterized to match the
AuthorizationPolicy above (must target the same gateway pods).
*/}}
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: {{ include "enbuild-helm-chart.fullname" . }}-xfcc-sanitize
  namespace: {{ .Values.pki.istioAuthorizationPolicy.namespace | default "istio-system" }}
  labels:
    {{- include "enbuild-helm-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent-gateway-authz
spec:
  workloadSelector:
    labels: {{- toYaml (.Values.pki.istioAuthorizationPolicy.selectorMatchLabels | default (dict "istio" "ingressgateway")) | nindent 6 }}
  configPatches:
    - applyTo: NETWORK_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: "envoy.filters.network.http_connection_manager"
      patch:
        operation: MERGE
        value:
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
            forward_client_cert_details: SANITIZE_SET
            set_current_client_cert_details:
              subject: true
              uri: true
              dns: true
{{- end }}
