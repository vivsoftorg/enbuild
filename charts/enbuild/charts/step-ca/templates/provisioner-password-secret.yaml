{{- if and .Values.enabled (not .Values.ca.provisioner.passwordSecret.name) }}
# Auto-generated provisioner password Secret. Created on first install via
# helm's randAlphaNum + lookup pattern (preserves password across helm upgrades
# by reading back the existing Secret if present, so step-ca's persisted CA
# database remains decryptable).
{{- $existing := lookup "v1" "Secret" .Release.Namespace (printf "%s-step-ca-provisioner-password" .Release.Name) -}}
{{- $password := "" -}}
{{- if $existing -}}
  {{- $password = index $existing.data .Values.ca.provisioner.passwordSecret.key -}}
{{- else -}}
  {{- $password = randAlphaNum 32 | b64enc -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-step-ca-provisioner-password
  labels: {{- include "step-ca.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
    "helm.sh/resource-policy": keep
type: Opaque
data:
  {{ .Values.ca.provisioner.passwordSecret.key }}: {{ $password }}
{{- end }}
