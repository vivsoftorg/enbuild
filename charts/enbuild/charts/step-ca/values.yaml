# Minimal step-ca subchart values. Default off — parent chart's pki.enabled +
# stepCa.enabled gate rendering. When enabled, the subchart deploys:
#   - 1 step-ca pod with a tiny PVC for the CA database + intermediate keys
#   - 1 ClusterIP Service exposing :9000 (HTTPS) for cert-manager + agents to talk to
#   - 1 ConfigMap with the bootstrap config (provisioner, root CA template)
#
# Passive renewal mode: 90-day cert lifetime, renew at 75 days remaining.
# Persistence: 1Gi default; vendor13-ib uses the cluster's default StorageClass.

enabled: false

image:
  repository: smallstep/step-ca
  tag: "0.27.5"
  pullPolicy: IfNotPresent

# CA bootstrap config. step-ca is initialized on first start by the init container
# using `step ca init`. Subsequent restarts reuse the persisted state.
ca:
  name: enbuild-hub-ca
  dnsName: step-ca.enbuild.svc.cluster.local
  # Provisioner (JWK) used by cert-manager's `step` Issuer to request certs.
  provisioner:
    name: enbuild-hub-cert-manager
    # Password for the provisioner key. In a prototype we generate a random one
    # at install time and store it as a K8s Secret. Production: rotate via Vault.
    passwordSecret:
      # When non-empty, the install init-container reads the password from this
      # existing Secret. When empty, the init-container generates a random
      # password and creates the Secret on first start.
      name: ""
      key: provisioner-password

# Cert lifetime (used by step-ca's CA config; cert-manager respects its own
# Certificate spec for hub server cert, this just bounds CA-issued cert max).
defaultCertDuration: 2160h  # 90d
maxCertDuration: 8760h      # 365d

service:
  type: ClusterIP
  port: 9000

persistence:
  enabled: true
  size: 1Gi
  storageClassName: ""  # empty → use cluster default

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: true
